<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NyxHub Drop — mockup: token entry</title>
<link rel="stylesheet" href="mockup.css">
</head>
<body>
<div class="mock-banner"></div>
<header><div class="wordmark">NyxHub <span class="dim">Drop</span></div></header>
<main>
  <h1>Deploy a site</h1>
  <p class="sub">Drop your static files here and get a temporary URL. Sites expire after 24 hours.</p>

  <div class="card">
    <div class="field">
      <label for="token">Upload token</label>
      <input id="token" type="password" placeholder="Paste your upload token" autocomplete="off">
      <span class="hint">Ask the administrator for the token. It's remembered in this browser.</span>
    </div>
    <button type="button" class="btn-primary">Save token</button>
  </div>
</main>
